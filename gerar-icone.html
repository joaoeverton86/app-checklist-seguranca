<!DOCTYPE html>
<html>
<head>
    <title>Gerador de Ícones</title>
</head>
<body>
    <h1>Gerador de Ícones PWA</h1>
    <p>Clique nos botões para baixar os ícones:</p>
    <canvas id="canvas192" width="192" height="192"></canvas>
    <br>
    <button onclick="download('icon-192.png', 192)">Baixar 192x192</button>
    <br><br>
    <canvas id="canvas512" width="512" height="512"></canvas>
    <br>
    <button onclick="download('icon-512.png', 512)">Baixar 512x512</button>

    <script>
        function drawIcon(canvas, size) {
            const ctx = canvas.getContext('2d');
            
            // Fundo azul arredondado
            ctx.fillStyle = '#1a5276';
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size, size * 0.15);
            ctx.fill();
            
            // Checkmark branco
            ctx.strokeStyle = 'white';
            ctx.lineWidth = size * 0.08;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(size * 0.25, size * 0.5);
            ctx.lineTo(size * 0.42, size * 0.67);
            ctx.lineTo(size * 0.75, size * 0.33);
            ctx.stroke();
        }

        // Desenhar ícones
        drawIcon(document.getElementById('canvas192'), 192);
        drawIcon(document.getElementById('canvas512'), 512);

        function download(filename, size) {
            const canvas = document.getElementById('canvas' + size);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
