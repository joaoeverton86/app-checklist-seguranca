<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Gerar QR Code - Patrimonio</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; background: #f0f2f5; }
        h2 { color: #1a5276; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dce1e6; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { padding: 14px 28px; background: #1a5276; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 10px 5px; width: 100%; }
        button:hover { background: #0e3a53; }
        #qrcode { margin: 20px auto; padding: 16px; background: white; display: none; border: 1px solid #dce1e6; border-radius: 8px; text-align: center; }
        #qrcode img { max-width: 100%; }
        #downloadBtn { display: none; background: #27ae60; margin-top: 0; }
        .patrimonio-list { text-align: left; margin-top: 20px; }
        .patrimonio-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: white; border: 1px solid #dce1e6; border-radius: 8px; margin: 6px 0; cursor: pointer; transition: background 0.15s; }
        .patrimonio-item:hover { background: #eaf2f8; }
        .patrimonio-item .pat { font-weight: 700; color: #1a5276; }
        .patrimonio-item .nome { font-size: 12px; color: #7f8c8d; }
        .section-title { font-size: 16px; font-weight: 700; color: #1a5276; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 2px solid #1a5276; }
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .search-input { width: 100%; padding: 10px; border: 1px solid #dce1e6; border-radius: 8px; font-size: 14px; box-sizing: border-box; margin-bottom: 10px; }
        .empty { text-align: center; padding: 20px; color: #7f8c8d; }
    </style>
</head>
<body>

    <h2>Gerar QR Code de Patrimonio</h2>

    <div class="card">
        <input type="text" id="patrimonioInput" placeholder="Digite o patrimonio/placa...">
        <button onclick="gerarQR()">Gerar QR Code</button>
        <div id="qrcode"></div>
        <button id="downloadBtn" onclick="downloadQR()">Baixar Imagem</button>
    </div>

    <div class="section-title">Patrimonios Cadastrados</div>
    <input type="text" class="search-input" id="searchInput" placeholder="Buscar patrimonio..." oninput="filtrarLista()">
    <div class="patrimonio-list" id="patrimonioList">
        <div class="empty">Carregando patrimonios...</div>
    </div>

    <script src="qrcode.min.js?v=2"></script>
    <script>
        let todosPatrimonios = [];

        function gerarQR() {
            const pat = document.getElementById('patrimonioInput').value.trim();
            if (!pat) { alert('Digite um patrimonio!'); return; }

            try {
                const qr = qrcode(0, 'M');
                qr.addData(pat);
                qr.make();

                const qrcodeDiv = document.getElementById('qrcode');
                qrcodeDiv.innerHTML = qr.createImgTag(6, 4);
                qrcodeDiv.style.display = 'inline-block';

                const downloadBtn = document.getElementById('downloadBtn');
                downloadBtn.style.display = 'block';
                downloadBtn.textContent = 'Baixar ' + pat + '.png';
            } catch (err) {
                alert('Erro ao gerar QR Code: ' + err);
            }
        }

        function downloadQR() {
            const img = document.querySelector('#qrcode img');
            if (!img) return;
            const pat = document.getElementById('patrimonioInput').value.trim() || 'qrcode';
            const link = document.createElement('a');
            link.download = pat + '.png';
            link.href = img.src;
            link.click();
        }

        function renderLista(filtro) {
            const list = document.getElementById('patrimonioList');
            const filtrados = filtro
                ? todosPatrimonios.filter(p =>
                    p.pat.toLowerCase().includes(filtro) ||
                    p.nome.toLowerCase().includes(filtro))
                : todosPatrimonios;

            if (filtrados.length === 0) {
                list.innerHTML = '<div class="empty">Nenhum patrimonio cadastrado. Cadastre equipamentos no app primeiro.</div>';
                return;
            }

            list.innerHTML = '';
            filtrados.forEach(p => {
                const div = document.createElement('div');
                div.className = 'patrimonio-item';
                div.innerHTML = '<div><span class="pat">' + p.pat + '</span><div class="nome">' + p.nome + '</div></div><span style="font-size:20px">&#128241;</span>';
                div.onclick = function() {
                    document.getElementById('patrimonioInput').value = p.pat;
                    gerarQR();
                    window.scrollTo({top: 0, behavior: 'smooth'});
                };
                list.appendChild(div);
            });
        }

        function filtrarLista() {
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            renderLista(q);
        }

        async function carregarDoIndexedDB() {
            try {
                const request = indexedDB.open('ChecklistSeguranca', 3);
                request.onsuccess = function(e) {
                    const db = e.target.result;
                    const tx = db.transaction('cadastros', 'readonly');
                    const store = tx.objectStore('cadastros');
                    const getAll = store.getAll();
                    getAll.onsuccess = function() {
                        const cadastros = getAll.result.filter(function(c) { return c.ativo !== false && c.patrimonio; });
                        if (cadastros.length > 0) {
                            todosPatrimonios = cadastros.map(function(c) { return { pat: c.patrimonio, nome: c.nome || c.empresa || '' }; });
                            renderLista('');
                        } else {
                            carregarDaPlanilha();
                        }
                    };
                };
                request.onerror = function() { carregarDaPlanilha(); };
            } catch (err) { carregarDaPlanilha(); }
        }

        function carregarDaPlanilha() {
            const url = localStorage.getItem('sync_script_url') || 'https://script.google.com/macros/s/AKfycbzhFCnB2VLSH4i7i_JNZajCc_88UgQEWdeHtgzHtcJGaS_kHQd7ixffVab2F9zHiMWFZQ/exec';
            if (!url) {
                renderLista('');
                return;
            }
            fetch(url + '?store=' + encodeURIComponent('Cadastros'))
                .then(function(r) { return r.json(); })
                .then(function(result) {
                    if (result.success && result.data) {
                        todosPatrimonios = result.data
                            .filter(function(r) { return r['Patrimônio']; })
                            .map(function(r) { return { pat: r['Patrimônio'], nome: r['Nome'] || r['Empresa'] || '' }; });
                    }
                    renderLista('');
                })
                .catch(function() { renderLista(''); });
        }

        renderLista('');
        carregarDoIndexedDB();
    </script>
</body>
</html>
